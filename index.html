<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liftori-Med</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF3F1; --panel:#FFFFFF; --panel-2:#F7FAF9;
    --ink:#0E2A29; --muted:#5C726F; --faint:#8A9C99;
    --line:#E2EBE9; --line-2:#D5E2DF;
    --deep:#0B3D3A; --deep-2:#0A312E;
    --teal:#11756E; --teal-600:#0E5F59; --teal-bright:#16A89B;
    --mint:#E6F3F0; --mint-2:#DCEEEA;
    --gold:#BE9E54;
    --ok:#2E9E6B; --ok-bg:#E5F4EC;
    --warn:#C98A2E; --warn-bg:#F8EFDD;
    --alert:#C75B41; --alert-bg:#F8E9E4;
    --r:14px; --r-sm:10px; --r-lg:20px;
    --sans:'Inter',-apple-system,system-ui,sans-serif;
    --serif:'Newsreader',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  svg.ic{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:none}
  svg.ic-sm{width:15px;height:15px}
  .hidden{display:none !important}

  /* ===== top chrome ===== */
  .chrome{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:32px;height:32px;border-radius:9px;background:var(--deep);display:flex;align-items:center;justify-content:center}
  .brand .mark svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .wordmark{font-size:19px;letter-spacing:-.02em;font-weight:600}
  .wordmark b{color:var(--teal)} .wordmark .d{color:var(--gold)}
  .switch{display:inline-flex;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:3px}
  .switch button{border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:500;padding:7px 16px;border-radius:999px}
  .switch button.on{background:var(--deep);color:#fff}
  .env{font-size:11.5px;color:var(--faint);border:1px solid var(--line-2);border-radius:999px;padding:5px 12px}

  /* ===== provider workspace ===== */
  .work{display:grid;grid-template-columns:226px 1fr;min-height:calc(100vh - 61px)}
  .side{background:var(--deep);color:#CFE3DF;padding:18px 14px;display:flex;flex-direction:column}
  .clinic{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
  .clinic .logo{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff}
  .clinic .nm{font-size:13.5px;color:#fff;font-weight:500;line-height:1.2}
  .clinic .sub{font-size:11px;color:#7FA39D}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:#A7C6C1;font-size:13.5px;border:none;background:transparent;text-align:left;width:100%}
  .nav button svg{color:#7FA39D}
  .nav button.on{background:var(--teal);color:#fff} .nav button.on svg{color:#fff}
  .side .foot{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
  .av{width:30px;height:30px;border-radius:50%;background:var(--teal-bright);color:#04332f;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex:none}
  .foot .nm{font-size:12.5px;color:#fff} .foot .sub{font-size:11px;color:#7FA39D}

  .main{padding:24px 28px;overflow:auto}
  .ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
  .ph h1{font-family:var(--serif);font-weight:500;font-size:26px;letter-spacing:-.01em}
  .ph .sub{font-size:13px;color:var(--muted);margin-top:3px}
  .live{font-size:11.5px;font-weight:500;color:var(--ok);background:var(--ok-bg);padding:5px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:7px;margin-left:12px;vertical-align:middle}
  .live .b{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .btn{font-size:13px;font-weight:500;color:#fff;background:var(--teal);border:none;border-radius:10px;padding:9px 15px;display:inline-flex;align-items:center;gap:8px}
  .btn.ghost{background:#fff;color:var(--teal-600);border:1px solid var(--line-2)}
  .btn:active{transform:scale(.98)}

  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
  .metric .l{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .metric .n{font-family:var(--serif);font-size:26px;font-weight:500;margin-top:9px}
  .metric .dlt{font-size:11.5px;margin-top:3px;color:var(--ok)} .metric .dlt.flat{color:var(--faint)}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px 17px}
  .card .ct{font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
  .card .ct .sm{font-size:11.5px;font-weight:400;color:var(--faint)}

  .feed .it{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .feed .it:last-child{border-bottom:none}
  .feed .ico{width:30px;height:30px;border-radius:8px;background:var(--mint);color:var(--teal-600);display:flex;align-items:center;justify-content:center;flex:none}
  .feed .ico.g{background:var(--ok-bg);color:var(--ok)} .feed .ico.a{background:var(--warn-bg);color:var(--warn)}
  .feed .tx{font-size:13px;line-height:1.45} .feed .tx b{font-weight:600}
  .feed .meta{font-size:11.5px;color:var(--faint);margin-top:2px}

  .sch .row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .sch .row:last-child{border-bottom:none}
  .sch .tm{font-size:12px;color:var(--muted);width:64px;flex:none;font-variant-numeric:tabular-nums}
  .sch .who{flex:1;min-width:0}.sch .who .n{font-size:13px;font-weight:500}.sch .who .v{font-size:11.5px;color:var(--faint)}
  .chip{font-size:11px;font-weight:500;padding:4px 9px;border-radius:999px;white-space:nowrap}
  .chip.ok{background:var(--ok-bg);color:var(--ok)} .chip.tel{background:var(--mint);color:var(--teal-600)}
  .chip.in{background:#EAEFEE;color:var(--muted)} .chip.rec{background:var(--warn-bg);color:var(--warn)}
  .chip.new{background:var(--mint-2);color:var(--teal-600)}
  .row.flash{animation:flash 1.6s ease}
  @keyframes flash{0%{background:var(--mint)}100%{background:transparent}}

  .call{background:var(--deep);border-radius:var(--r);padding:17px 18px;color:#DCEBE8;margin-top:16px}
  .call .top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .call .top .pc{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#7FD7CC}
  .call .top .t{font-size:13px;color:#fff;font-weight:500}.call .top .s{font-size:11.5px;color:#7FA39D}
  .bub{max-width:78%;font-size:12.5px;line-height:1.45;padding:9px 12px;border-radius:12px;margin-bottom:9px}
  .bub .who{font-size:10.5px;opacity:.7;margin-bottom:2px;display:block}
  .bub.ai{background:var(--teal);color:#fff;border-bottom-left-radius:4px}
  .bub.pt{background:rgba(255,255,255,.08);color:#CFE3DF;margin-left:auto;border-bottom-right-radius:4px}

  /* tables / lists */
  .list{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .list .lrow{display:flex;align-items:center;gap:14px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .list .lrow:last-child{border-bottom:none}
  .list .lrow .nm{font-size:13.5px;font-weight:500} .list .lrow .mt{font-size:11.5px;color:var(--faint)}
  .seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:16px}
  .seg button{border:none;background:transparent;color:var(--muted);font-size:12.5px;font-weight:500;padding:6px 13px;border-radius:7px}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 0 0 1px var(--line)}
  .stub{background:#fff;border:1px dashed var(--line-2);border-radius:var(--r);padding:34px;text-align:center;color:var(--muted)}
  .stub .si{width:46px;height:46px;border-radius:12px;background:var(--mint);color:var(--teal-600);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .stub h3{font-family:var(--serif);font-weight:500;font-size:18px;color:var(--ink);margin-bottom:5px}
  .stub p{font-size:13px;max-width:380px;margin:0 auto}
  .twocol{display:grid;grid-template-columns:1fr 320px;gap:16px}
  .msgthread{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:10px;min-height:300px}
  .msg{max-width:75%;font-size:13px;padding:9px 12px;border-radius:12px;line-height:1.45}
  .msg.them{background:var(--panel-2);border:1px solid var(--line)} .msg.me{background:var(--teal);color:#fff;align-self:flex-end}

  /* ===== patient app ===== */
  .patientwrap{display:flex;justify-content:center;padding:30px 16px 50px}
  .device{width:392px;max-width:100%;background:#0B3D3A;border-radius:38px;padding:12px}
  .pscreen{background:var(--bg);border-radius:28px;overflow:hidden;height:760px;display:flex;flex-direction:column;position:relative}
  .pnotch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#0B3D3A;border-radius:999px;z-index:6}
  .pstat{display:flex;justify-content:space-between;align-items:center;padding:14px 22px 6px;font-size:11px;font-weight:500}
  .pbody{flex:1;overflow:auto;padding:6px 18px 14px}
  .ptabs{display:flex;border-top:1px solid var(--line);background:var(--panel)}
  .ptabs button{flex:1;border:none;background:transparent;padding:11px 4px 14px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--faint);font-size:10px;font-weight:500}
  .ptabs button.on{color:var(--teal)}
  .pgreet{font-size:12px;color:var(--muted);margin-top:8px}
  .pname{font-family:var(--serif);font-size:23px;font-weight:500;margin-top:1px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-top:14px}
  .pcard.next{background:var(--deep);border:none;color:#fff}
  .pcard.next .lab{font-size:11px;color:#7FD7CC;letter-spacing:.06em;text-transform:uppercase}
  .pcard.next .ti{font-size:15px;font-weight:600;margin-top:7px}
  .pcard.next .sb{font-size:12px;color:#A9C8C3;margin-top:3px;display:flex;align-items:center;gap:7px}
  .pbtn{background:var(--teal-bright);color:#04332f;font-weight:600;font-size:13px;border:none;border-radius:11px;padding:12px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:13px}
  .pbtn.alt{background:var(--teal);color:#fff}
  .pbtn.ghost{background:#fff;color:var(--teal-600);border:1px solid var(--line-2)}
  .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:14px}
  .qa{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px 4px;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10.5px;color:var(--muted)}
  .qa .qi{width:32px;height:32px;border-radius:9px;background:var(--mint);color:var(--teal-600);display:flex;align-items:center;justify-content:center}
  .plab{font-size:12px;font-weight:600;color:var(--muted);margin:18px 0 0;display:flex;justify-content:space-between;align-items:center}
  .team{display:flex;gap:9px;margin-top:11px}
  .tmem{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 8px;text-align:center}
  .tmem .av2{width:38px;height:38px;border-radius:50%;background:var(--mint-2);color:var(--teal-600);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;margin:0 auto 7px}
  .tmem .tn{font-size:11px;font-weight:500} .tmem .tr{font-size:10px;color:var(--faint);margin-top:2px}
  .stitle{font-family:var(--serif);font-size:21px;font-weight:500;margin-top:10px}
  .navi{background:var(--deep);border-radius:var(--r);padding:13px;margin-top:14px;color:#fff}
  .navi .nh{font-size:11px;color:#7FD7CC;display:flex;align-items:center;gap:7px;margin-bottom:9px}
  .navi .nq{font-size:13px} .navi .ans{font-size:12px;color:#A9C8C3;background:rgba(255,255,255,.07);border-radius:10px;padding:9px 11px;margin-top:10px;line-height:1.45}
  .provrow{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px;margin-top:14px}
  .provrow .av2{width:42px;height:42px;border-radius:50%;background:var(--mint-2);color:var(--teal-600);display:flex;align-items:center;justify-content:center;font-weight:600;flex:none}
  .provrow .pn{font-size:13px;font-weight:600}.provrow .pr{font-size:11.5px;color:var(--faint)}
  .provrow .match{margin-left:auto;font-size:10.5px;font-weight:500;color:var(--ok);background:var(--ok-bg);padding:4px 9px;border-radius:999px}
  .slotlab{font-size:12px;font-weight:600;color:var(--muted);margin-top:16px}
  .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .slot{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--ink)}
  .slot .d{font-size:10px;color:var(--faint);font-weight:400;margin-top:2px}
  .slot.sel{background:var(--teal);color:#fff;border-color:var(--teal)} .slot.sel .d{color:#BFE8E2}
  .success{text-align:center;padding:26px 8px}
  .success .ring{width:74px;height:74px;border-radius:50%;background:var(--ok-bg);color:var(--ok);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  .success h3{font-family:var(--serif);font-weight:500;font-size:21px;margin-bottom:6px}
  .success p{font-size:13px;color:var(--muted);max-width:260px;margin:0 auto}
  .vid{flex:1;background:var(--deep-2);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
  .vid .bigav{width:96px;height:96px;border-radius:50%;background:#16433f;display:flex;align-items:center;justify-content:center;font-size:30px;color:#7FD7CC;font-weight:600}
  .vid .vn{font-size:15px;font-weight:500;margin-top:16px} .vid .vs{font-size:12px;color:#8FB5AF;margin-top:4px}
  .vid .ptile{position:absolute;bottom:96px;right:14px;width:74px;height:96px;border-radius:12px;background:#16433f;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#7FD7CC;font-size:11px}
  .vctrl{position:absolute;bottom:22px;display:flex;gap:14px}
  .vbtn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#fff;border:none}
  .vbtn.end{background:var(--alert)}
  .medrow{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
  .medrow .mi{width:34px;height:34px;border-radius:9px;background:var(--mint);color:var(--teal-600);display:flex;align-items:center;justify-content:center;flex:none}
  .medrow .mn{font-size:13px;font-weight:500} .medrow .md{font-size:11.5px;color:var(--faint)}
  .medrow .price{margin-left:auto;text-align:right} .medrow .price b{font-size:13px;color:var(--teal-600)} .medrow .price span{display:block;font-size:10.5px;color:var(--faint)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:11px 18px;border-radius:999px;z-index:60;opacity:0;transition:opacity .25s, transform .25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  @media(max-width:820px){ .work{grid-template-columns:1fr} .side{display:none} .metrics{grid-template-columns:repeat(2,1fr)} .cols,.twocol{grid-template-columns:1fr} }

  /* ===== receptionist portal (pop-out softphone) ===== */
  body.rcp{background:var(--panel-2)}
  .rcp-wrap{display:flex;flex-direction:column;min-height:100vh;width:100%;background:var(--bg)}
  .rcp-grid3{display:grid;grid-template-columns:344px minmax(0,1fr) 330px;gap:16px;align-items:start}
  .rcp-grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px;align-items:start}
  .rcp-narrow{max-width:820px}
  @media(max-width:1040px){.rcp-grid3,.rcp-grid2{grid-template-columns:1fr}}
  .rcp-top{background:var(--deep);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
  .rcp-top .wm{font-size:15px;font-weight:600;letter-spacing:-.02em}
  .rcp-top .wm b{color:#7FD7CC} .rcp-top .wm .g{color:var(--gold)}
  .rcp-who{display:flex;align-items:center;gap:8px}
  .rcp-who select{background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:8px;padding:6px 8px;font-size:12px}
  .rcp-cov{font-size:11.5px;font-weight:500;padding:8px 16px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--line);background:var(--mint);color:var(--teal-600)}
  .rcp-cov .b{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 1.8s infinite}
  .rcp-body{flex:1;overflow:auto;padding:18px 22px}
  .rcp-call{background:var(--deep);color:#fff;border-radius:18px;padding:20px 18px;text-align:center;margin-bottom:14px}
  .rcp-call.ring{background:var(--teal)}
  .rcp-bigav{width:66px;height:66px;border-radius:50%;background:#16433f;color:#7FD7CC;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;margin:0 auto}
  .rcp-call.ring .rcp-bigav{background:rgba(255,255,255,.15);color:#fff}
  .rcp-call .nm{font-size:18px;font-weight:600;margin-top:10px}
  .rcp-call .rs{font-size:12.5px;color:#A9C8C3;margin-top:3px}
  .rcp-call.ring .rs{color:#CFF3EE}
  .rcp-call .tmr{font-size:13px;color:#7FD7CC;margin-top:7px;font-variant-numeric:tabular-nums}
  .rcp-call .chip{margin-top:9px;display:inline-block}
  .rcp-actions{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .rcp-cbtn{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.13);border:none;color:#fff;display:flex;align-items:center;justify-content:center}
  .rcp-cbtn.end{background:var(--alert)} .rcp-cbtn.ans{background:var(--ok)} .rcp-cbtn.on{background:var(--teal-bright);color:#04332f}
  .rcp-cbtn .lbl,.rcp-act{font-size:0}
  .rcp-dispo{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .rcp-dispo button{background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:9px;padding:8px 12px;font-size:12px;font-weight:500}
  .rcp-dispo button.go{background:var(--teal-bright);color:#04332f}
  .rcp-dial{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
  .rcp-dialnum{text-align:center;font-size:23px;font-weight:500;letter-spacing:1px;min-height:32px;color:var(--ink)}
  .rcp-dialnum .ph{color:var(--faint);font-size:14px;font-weight:400}
  .rcp-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:300px;margin:8px auto 0}

function ccHandleForm(i){ const f=cc.forms[i]; if(!f) return; cc.forms.splice(i,1); cc.ai.unshift({tx:'<b>Form handled</b> — '+f.who+': '+f.type+'.',meta:'just now · front desk',kind:'ok'}); cc.ai=cc.ai.slice(0,6); renderMain(); toast('Handled: '+f.who); }
function ccConfirmAppt(i){ const a=cc.appts[i]; if(!a) return; cc.appts.splice(i,1); const open=provider.schedule.find(r=>r.patient==='Open'); if(open){open.patient=a.who; open.v=a.what; open.chip='new'; open.chipL='Appt confirmed'; open.flash=true; setTimeout(()=>{const o=provider.schedule.find(r=>r.flash);if(o)o.flash=false;},1700);} renderMain(); toast('Appointment confirmed for '+a.who); }
function ccToggle(){ cc.mode = cc.mode==='hours'?'afterhours':'hours'; cc.ringing=null; cc.active=null; renderMain(); toast(cc.mode==='afterhours'?'After-hours — Liftori AI now covering':'Business hours — your staff are answering'); }
function ccSim(){
  const c={...cc.callers[Math.floor(Math.random()*cc.callers.length)]};
  if(cc.mode==='afterhours'){ ccAiHandle(c,'after-hours'); return; }
  const a=ccAvail()[0];
  if(!a){ ccAiHandle(c,'overflow'); return; }
  c.agent=a.name.split(' ')[0]; cc.ringing=c; renderMain(); toast('Incoming call ringing '+c.agent);
}
function ccAnswer(){ const c=cc.ringing; if(!c) return; const a=cc.agents.find(x=>x.name.split(' ')[0]===c.agent); if(a)a.status='oncall'; cc.active=c; cc.ringing=null; renderMain(); }
function ccToAI(){ const c=cc.ringing; cc.ringing=null; if(c) ccAiHandle(c,'overflow'); }
function ccDispo(kind){
  const c=cc.active; if(!c) return;
  const a=cc.agents.find(x=>x.name.split(' ')[0]===c.agent); if(a)a.status='available';
  cc.active=null; cc.metrics.today++; cc.metrics.byStaff++;
  if(kind==='booked'){ const open=provider.schedule.find(r=>r.patient==='Open'); if(open){open.patient=c.who; open.v='Booked by '+c.agent; open.chip='new'; open.chipL='Booked at front desk'; open.flash=true; setTimeout(()=>{const o=provider.schedule.find(r=>r.flash); if(o)o.flash=false;},1700);} toast(c.who+' booked'); }
  else if(kind==='message'){ cc.metrics.callbacks++; toast('Message taken for '+c.who); }
  else if(kind==='nurse'){ toast('Transferred '+c.who+' to the triage nurse'); }
  else toast('Call ended'); renderMain();
}
function ccAiHandle(c,why){
  cc.metrics.today++; cc.metrics.byAI++;
  const txt=(why==='after-hours')
    ? '<b>After-hours — handled</b> — '+c.who+': '+c.reason+'. Booked/relayed and confirmed by text.'
    : '<b>Overflow — handled</b> — '+c.who+': '+c.reason+'. Staff were busy; AI caught it so it was not missed.';
  cc.ai.unshift({tx:txt,meta:'just now · Liftori AI',kind:'ok'}); cc.ai=cc.ai.slice(0,6);
  renderMain(); toast('Liftori AI handled '+c.who+' ('+why+')');
}

  const list=rc.intakes.length?rc.intakes.map(it=>'<div class="rcp-item" style="cursor:pointer" onclick="rcIntakeOpen(\''+it.id+'\')"><span class="rcp-ico'+(it.status==='completed'?' new':'')+'">'+svg(ICON.doc,'ic ic-sm')+'</span><div style="flex:1"><div class="nm">'+it.name+'</div><div class="mt">'+(it.status==='completed'?'Completed — ready to review':'Sent — awaiting patient')+'</div></div>'+(it.status==='completed'?'<span class="chip ok">Done</span>':'<span class="chip" style="background:var(--warn-bg);color:var(--warn)">Sent</span>')+'</div>').join(''):'<div class="rcp-empty">No intakes yet. Send one from a call or here.</div>';
  return '<div class="rcp-narrow"><div class="rcp-sub" style="margin-top:4px;display:flex;justify-content:space-between;align-items:center">Patient intake <button class="rcp-mini" style="margin:0" onclick="rcSendIntake(\'\')">New intake link</button></div>'+list+'</div>';
}
const ix={token:null,meta:null,done:false,sb:null};
async function ixBoot(){ document.body.className='rcp'; ix.token=new URLSearchParams(location.search).get('token'); document.body.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--muted)">Loading…</div>'; if(window.supabase){ try{ ix.sb=window.supabase.createClient(SB_URL,SB_KEY); const r=await ix.sb.rpc('get_intake_meta',{p_token:ix.token}); ix.meta=(r.data&&r.data[0])||null; }catch(e){} } ixRender(); }
function ixRow(label,id,ph,type){ return '<label style="display:block;font-size:12px;color:var(--muted);margin:10px 0 4px">'+label+'</label><input class="rcp-input" id="'+id+'" placeholder="'+(ph||'')+'"'+(type?(' type="'+type+'"'):'')+' style="margin:0">'; }
function ixRender(){ document.body.className='rcp'; let inner;
  if(!ix.meta){ inner='<div class="rcp-empty">This intake link is invalid or has already been completed.</div>'; }
  else if(ix.meta.status==='completed'||ix.done){ inner='<div style="text-align:center;padding:18px"><div class="rcp-bigav" style="background:var(--ok-bg);color:var(--ok);margin:0 auto">'+svg(ICON.check)+'</div><div style="font-size:18px;font-weight:600;margin-top:14px">All done — thank you!</div><div class="mt" style="margin-top:6px">Your intake is complete. See you at your visit.</div></div>'; }
  else { inner='<div style="font-size:18px;font-weight:600;text-align:center">Welcome'+(ix.meta.patient_name?(', '+ix.meta.patient_name.split(' ')[0]):'')+'</div><div class="mt" style="text-align:center;margin-bottom:4px">A few minutes now saves time at your visit.</div>'
    +'<div class="rcp-sub">Your info</div>'+ixRow('Full name','ix-name',ix.meta.patient_name||'')+ixRow('Date of birth','ix-dob','MM/DD/YYYY')+ixRow('Phone','ix-phone','(555) 555-5555')+ixRow('Email','ix-email','you@email.com','email')
    +'<div class="rcp-sub">Insurance</div>'+ixRow('Insurance carrier','ix-payer','e.g. Florida Blue')+ixRow('Member ID','ix-member','')
    +'<div class="rcp-sub">Your visit</div>'+ixRow('Reason for visit','ix-reason','What brings you in?')
    +'<div class="rcp-sub">Medical history</div>'+ixRow('Allergies','ix-allergies','Medications, foods, etc.')+ixRow('Current medications','ix-meds','')+ixRow('Conditions / history','ix-history','Anything we should know')
    +'<label style="display:flex;gap:8px;align-items:flex-start;margin:14px 0;font-size:12.5px;color:var(--muted)"><input type="checkbox" id="ix-consent" style="margin-top:3px">I consent to treatment and acknowledge the notice of privacy practices.</label>'
    +'<button class="rcp-callbtn" style="background:var(--teal);height:48px" onclick="ixSubmit()">Submit intake</button>'; }
  document.body.innerHTML='<div class="rcp-wrap" style="max-width:620px"><div class="rcp-top"><div class="wm">Liftori<span class="g">·</span><b>Med</b> · Intake</div></div><div class="rcp-body"><div class="card" style="padding:22px;text-align:left">'+inner+'</div></div><div class="toast" id="toast"></div></div>';
}
async function ixSubmit(){ const cb=document.getElementById('ix-consent'); if(!cb||!cb.checked){ toast('Please consent to continue'); return; } const data={name:rcVal('ix-name'),dob:rcVal('ix-dob'),phone:rcVal('ix-phone'),email:rcVal('ix-email'),payer:rcVal('ix-payer'),member:rcVal('ix-member'),reason:rcVal('ix-reason'),allergies:rcVal('ix-allergies'),meds:rcVal('ix-meds'),history:rcVal('ix-history')}; try{ if(ix.sb) await ix.sb.rpc('submit_intake',{p_token:ix.token,p_data:data}); }catch(e){} ix.done=true; ixRender(); }
function rcBillingHtml(){
  const m=c=>'$'+Math.round((c||0)/100).toLocaleString();
  if(rc.appealView){ const a=rc.appealView; return '<div class="rcp-narrow"><button class="rcp-mini" style="margin:2px 0 12px" onclick="rcBillBack()">‹ Denials</button><div class="card"><div class="ct">Appeal letter · '+a.name+' <span class="chip" style="background:var(--mint);color:var(--teal-600)">AI drafted</span></div><textarea class="rcp-input" id="rc-appeal" style="height:300px;resize:vertical;font-size:12.5px;line-height:1.5">'+a.text+'</textarea><div style="display:flex;gap:8px;margin-top:6px"><button class="rcp-callbtn" style="background:var(--teal);height:44px;max-width:200px;margin:0" onclick="rcSendAppeal()">Send appeal</button><button class="rcp-mini" style="margin:0" onclick="rcBillBack()">Cancel</button></div></div></div>'; }
  const collected=rc.claims.filter(c=>c.status==='paid').reduce((s,c)=>s+c.charge,0);
  const denied=rc.claims.filter(c=>c.status==='denied').reduce((s,c)=>s+c.charge,0);
  const ar=rc.claims.filter(c=>c.status==='submitted').reduce((s,c)=>s+c.charge,0);
  const recover=Math.round(denied*0.78);
  const kp='<div class="rcp-kpis" style="grid-template-columns:repeat(4,1fr)"><div class="rcp-kpi"><div class="v">'+m(collected)+'</div><div class="l">Collected</div></div><div class="rcp-kpi"><div class="v">'+m(denied)+'</div><div class="l">Denied</div></div><div class="rcp-kpi"><div class="v">'+m(recover)+'</div><div class="l">Recoverable</div></div><div class="rcp-kpi"><div class="v">'+m(ar)+'</div><div class="l">In A/R</div></div></div>';
  const denials=rc.claims.filter(c=>c.status==='denied'||c.status==='appealed');
  const dHtml=denials.length?denials.map(c=>'<div class="rcp-item"><span class="rcp-ico" style="background:var(--alert-bg);color:var(--alert)">'+svg(ICON.alert,'ic ic-sm')+'</span><div style="flex:1"><div class="nm">'+c.name+' · '+m(c.charge)+'</div><div class="mt">CPT '+c.code+' · '+c.payer+' · '+(c.reason||'')+'</div></div>'+(c.status==='appealed'?'<span class="chip ok">Appealed</span>':'<button class="rcp-mini" onclick="rcDraftAppeal(\''+c.id+'\')">Draft appeal</button>')+'</div>').join(''):'<div class="rcp-empty">No denials right now.</div>';
  const pa=rc.pauths.length?rc.pauths.map(p=>'<div class="rcp-item"><span class="rcp-ico">'+svg(ICON.doc,'ic ic-sm')+'</span><div style="flex:1"><div class="nm">'+p.name+' · '+p.service+'</div><div class="mt">'+p.payer+'</div></div>'+(p.status==='approved'?'<span class="chip ok">Approved</span>':(p.status==='denied'?'<span class="chip rec">Denied</span>':'<button class="rcp-mini" onclick="rcPaAction(\''+p.id+'\')">'+(p.status==='needed'?'Submit':'Mark approved')+'</button>'))+'</div>').join(''):'<div class="rcp-empty">No prior auths pending.</div>';
  return '<div>'+kp+'<div class="rcp-grid2"><div class="card"><div class="ct">Denials worklist <span class="sm">'+denials.length+' open</span></div>'+dHtml+'<div class="mt" style="margin-top:8px;font-size:11.5px">Most denials are overturned on appeal — work them here.</div></div><div class="card"><div class="ct">Prior authorizations</div>'+pa+'</div></div></div>';
}
function rcBillBack(){ rc.appealView=null; rcRender(); }
function rcDraftAppeal(id){ const c=rc.claims.find(x=>x.id===id); if(!c) return; const m=v=>'$'+Math.round((v||0)/100).toLocaleString(); const letter='To the Appeals Department, '+c.payer+':\n\nRE: Formal appeal of denied claim\nPatient: '+c.name+'\nService: CPT '+c.code+' — '+c.desc+'\nBilled amount: '+m(c.charge)+'\nDenial reason: '+(c.reason||'N/A')+'\n\nWe respectfully appeal the above denial. The service was medically necessary, appropriately documented, and rendered by a licensed provider consistent with the patient’s treatment plan. The stated denial reason is not supported by the clinical record on file, which is attached for your review.\n\nWe request a full review and reprocessing of this claim for payment. If additional documentation is required, please contact our billing office directly.\n\nSincerely,\nCoastal Behavioral Health — Billing'; rc.appealView={id:c.id,name:c.name,text:letter}; rcRender(); }
function rcSendAppeal(){ const a=rc.appealView; if(!a) return; const c=rc.claims.find(x=>x.id===a.id); if(c) c.status='appealed'; if(rc.live){ try{ sbc.from('claims').update({status:'appealed'}).eq('id',a.id); }catch(e){} } rc.appealView=null; rcRender(); toast('Appeal sent — claim moved to Appealed'); }
function rcPaAction(id){ const p=rc.pauths.find(x=>x.id===id); if(!p) return; p.status=(p.status==='needed'?'submitted':'approved'); if(rc.live){ try{ sbc.from('prior_auths').update({status:p.status}).eq('id',id); }catch(e){} } rcRender(); toast('Prior auth '+p.status); }
async function rcLoadBilling(){ try{ const [c,p]=await Promise.all([sbc.from('claims').select('*').order('created_at',{ascending:false}), sbc.from('prior_auths').select('*').order('created_at',{ascending:false})]); if(c.data) rc.claims=c.data.map(x=>({id:x.id,name:x.patient_name,payer:x.payer,code:x.code,desc:x.description,charge:x.charge_cents,status:x.status,reason:x.denial_reason})); if(p.data) rc.pauths=p.data.map(x=>({id:x.id,name:x.patient_name,service:x.service,payer:x.payer,status:x.status})); }catch(e){} }
const RX_PRICES=[['Sertraline 50mg','$4','$32'],['Escitalopram 10mg','$7','$28'],['Bupropion XL 150mg','$12','$48'],['Fluoxetine 20mg','$4','$24'],['Hydroxyzine 25mg','$7','$19']];
function rcMedsHtml(){
  const q=rc.refills.length?rc.refills.map(r=>'<div class="rcp-item"><span class="rcp-ico">'+svg(ICON.pill,'ic ic-sm')+'</span><div style="flex:1"><div class="nm">'+r.name+' · '+r.med+'</div><div class="mt">'+(r.pharmacy||'')+'</div></div>'+(r.status==='sent'?'<span class="chip ok">Sent</span>':'<button class="rcp-mini" onclick="rcRefillAction(\''+r.id+'\')">'+(r.status==='requested'?'Approve':'Send to pharmacy')+'</button>')+'</div>').join(''):'<div class="rcp-empty">No refill requests.</div>';
  const prices='<table style="width:100%;font-size:12.5px;border-collapse:collapse"><tr style="color:var(--muted);font-size:11px;text-align:left"><th style="padding:4px 0">Medication</th><th>Cash (best)</th><th>Avg retail</th></tr>'+RX_PRICES.map(p=>'<tr style="border-top:1px solid var(--line)"><td style="padding:7px 0">'+p[0]+'</td><td style="color:var(--teal-600);font-weight:500">'+p[1]+'</td><td style="color:var(--faint)">'+p[2]+'</td></tr>').join('')+'</table>';
  return '<div class="rcp-grid2"><div class="card"><div class="ct">Refill requests <span class="sm">'+rc.refills.filter(r=>r.status!=='sent').length+' open</span></div>'+q+'</div>'
    +'<div class="card"><div class="ct">Price check <span class="sm">cash price at the counter</span></div>'+prices+'<div class="mt" style="margin-top:10px;font-size:11.5px">Lowest cash price shown to the prescriber at refill, so patients are never surprised at pickup. Interaction screening runs against the chart automatically.</div></div></div>';
}
async function rcLoadMeds(){ try{ const r=await sbc.from('refill_requests').select('*').order('created_at',{ascending:false}); if(r.data) rc.refills=r.data.map(x=>({id:x.id,name:x.patient_name,med:x.medication,pharmacy:x.pharmacy,status:x.status})); }catch(e){} }
function rcRefillAction(id){ const r=rc.refills.find(x=>x.id===id); if(!r) return; r.status=(r.status==='requested'?'approved':'sent'); if(rc.live){ try{ sbc.from('refill_requests').update({status:r.status}).eq('id',id); }catch(e){} } rcRender(); toast(r.status==='approved'?('Refill approved for '+r.name):('Sent to '+(r.pharmacy||'pharmacy'))); }
function rcRefsHtml(){
  const open=rc.refs.filter(r=>r.status==='sent'||r.status==='scheduled').length;
  const done=rc.refs.filter(r=>r.status==='completed').length;
  const closed=rc.refs.filter(r=>r.status==='completed'||r.status==='declined').length;
  const rate=rc.refs.length?Math.round(done/rc.refs.length*100):0;
  const kp='<div class="rcp-kpis" style="grid-template-columns:repeat(3,1fr)"><div class="rcp-kpi"><div class="v">'+open+'</div><div class="l">Open loops</div></div><div class="rcp-kpi"><div class="v">'+done+'</div><div class="l">Completed</div></div><div class="rcp-kpi"><div class="v">'+rate+'%</div><div class="l">Close rate</div></div></div>';
  const chip=st=>st==='completed'?'<span class="chip ok">Completed</span>':(st==='declined'?'<span class="chip rec">Declined</span>':(st==='scheduled'?'<span class="chip" style="background:var(--mint);color:var(--teal-600)">Scheduled</span>':'<span class="chip in">Sent</span>'));
  const btn=r=>(r.status==='sent')?'<button class="rcp-mini" onclick="rcRefAction(\''+r.id+'\',\'scheduled\')">Mark scheduled</button>':((r.status==='scheduled')?'<button class="rcp-mini" onclick="rcRefAction(\''+r.id+'\',\'completed\')">Close loop</button>':'');
  const list=rc.refs.length?rc.refs.map(r=>'<div class="rcp-item" style="align-items:flex-start"><span class="rcp-ico">'+svg(ICON.users,'ic ic-sm')+'</span><div style="flex:1"><div class="nm">'+r.name+' &rarr; '+r.to+'</div><div class="mt">'+(r.reason||'')+'</div></div><div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">'+chip(r.status)+btn(r)+'</div></div>').join(''):'<div class="rcp-empty">No referrals yet.</div>';
  return '<div>'+kp+'<div class="rcp-grid2"><div class="card"><div class="ct">Outbound referrals <span class="sm">'+open+' awaiting close</span></div>'+list+'<div class="mt" style="margin-top:8px;font-size:11.5px">A referral isn’t done until the patient is seen. Track every loop to completion so nothing falls through.</div></div><div class="card"><div class="ct">New referral</div><input class="rcp-input" id="rf-name" placeholder="Patient name"><input class="rcp-input" id="rf-to" placeholder="Refer to (specialist or org)"><input class="rcp-input" id="rf-reason" placeholder="Reason"><button class="rcp-callbtn" style="background:var(--teal);height:44px;max-width:220px;margin:8px 0 0" onclick="rcNewRef()">Send referral</button></div></div></div>';
}
async function rcLoadRefs(){ try{ const r=await sbc.from('referrals').select('*').order('created_at',{ascending:false}); if(r.data) rc.refs=r.data.map(x=>({id:x.id,name:x.patient_name,to:x.refer_to,reason:x.reason,status:x.status})); }catch(e){} }
function rcRefAction(id,st){ const r=rc.refs.find(x=>x.id===id); if(!r) return; r.status=st; if(rc.live){ try{ sbc.from('referrals').update({status:st}).eq('id',id); }catch(e){} } rcRender(); toast(st==='completed'?'Referral loop closed':'Marked '+st); }
function rcNewRef(){ const nm=rcVal('rf-name'), to=rcVal('rf-to'), rs=rcVal('rf-reason'); if(!nm||!to){ toast('Patient and referral target required'); return; } const row={name:nm,to:to,reason:rs,status:'sent'}; rc.refs.unshift(Object.assign({id:Date.now()},row)); if(rc.live&&rc.practiceId){ try{ sbc.from('referrals').insert({practice_id:rc.practiceId,patient_name:nm,refer_to:to,reason:rs,status:'sent'}); }catch(e){} } rcRender(); toast('Referral sent for '+nm); }
function rcSecGo(s){ rc.sec=s; if(s!=='patients') rc.selP=null; rcRender(); }
function rcFilter(){ const q=((document.getElementById('rc-psearch')||{}).value||'').toLowerCase(); const el=document.getElementById('rc-presults'); if(el) el.innerHTML=rcPatientRows(q); }
function rcAddToggle(){ rc.addP=!rc.addP; rcRender(); }
function rcAddPatient(){ const fn=rcVal('rc-fn'),ln=rcVal('rc-ln'); if(!fn||!ln){ toast('Enter first and last name'); return; } provider.patients.push({initials:(fn[0]+ln[0]).toUpperCase(),name:fn+' '+ln,mt:'New patient',status:'Active',phone:rcVal('rc-ph'),payer:rcVal('rc-pay')||'—',provider:'—',next:'',since:'now',meds:[]}); if(rc.live&&rc.practiceId){ try{ sbc.from('patients').insert({practice_id:rc.practiceId,first_name:fn,last_name:ln,phone:rcVal('rc-ph'),insurance_payer:rcVal('rc-pay')||null}); }catch(e){} } rc.addP=false; rcRender(); toast(fn+' '+ln+' added'); }
function rcSelPatient(i){ rc.selP=i; rc.sec='patients'; rcRender(); }
function rcBackPatients(){ rc.selP=null; rcRender(); }
function rcAddNote(who,id){ const v=rcVal(id); if(!v) return; rc.notes.unshift({id:Date.now(),text:v,who:who||'',at:'now'}); rcRender(); toast('Note saved'); }
function rcAddTask(who,id){ const v=rcVal(id); if(!v) return; rc.tasks.unshift({id:Date.now(),t:v,who:who||'',done:false}); rcRender(); toast('Task added'); }
function rcToggleTask(id){ const t=rc.tasks.find(x=>x.id===id); if(t)t.done=!t.done; rcRender(); }
function rcBook(){ var nm=rcVal('rc-bk-name'); var pvEl=document.getElementById('rc-bk-prov'); var provId=pvEl?pvEl.value:''; var provName=(rc.providers.find(function(p){return p.id===provId;})||{}).name||'Provider'; var vt=rcVal('rc-bk-vt')||'Follow-up'; var tm=(document.getElementById('rc-bk-time')||{}).value||'09:00'; var dur=parseInt((document.getElementById('rc-bk-dur')||{}).value||'30',10); var mod=(document.getElementById('rc-bk-mod')||{}).value||'in_person'; if(!nm){ toast('Patient name required'); return; } var ymd=rcDayYmd(rc.schDay); var startIso=ymd+'T'+tm+':00+00:00'; var em=parseInt(tm.slice(0,2),10)*60+parseInt(tm.slice(3,5),10)+dur; var eh=('0'+Math.floor(em/60)).slice(-2),emm=('0'+(em%60)).slice(-2); var endIso=ymd+'T'+eh+':'+emm+':00+00:00'; rc.appts.push({id:'tmp'+Date.now(),name:nm,providerId:provId,provider:provName,vt:vt,ymd:ymd,hh:tm.slice(0,2),mm:tm.slice(3,5),dur:dur,mod:mod,status:'booked',source:'staff'}); if(rc.live&&rc.practiceId&&provId&&provId!=='liu'&&provId!=='patel'){ try{ sbc.from('appointments').insert({practice_id:rc.practiceId,patient_name:nm,provider_id:provId,visit_type:vt,starts_at:startIso,ends_at:endIso,modality:mod,status:'booked',source:'staff'}); }catch(e){} } rcRender(); toast('Booked '+nm+' · '+rcTime12(tm.slice(0,2),tm.slice(3,5))); }
function rcRender(){ document.body.className='rcp'; document.body.innerHTML=rcHtml(); }
function rcSetStatus(v){ rc.status=v; if(rc.live&&rc.userId){ const m={available:'available',break:'break',off:'offline'}; try{ sbc.from('cc_agents').update({status:m[v]||'offline',last_seen_at:new Date().toISOString()}).eq('user_id',rc.userId); }catch(e){} } rcRender(); }
function rcTab(t){ rc.tab=t; rcRender(); }
function rcKey(d){ if(rc.dial.length<16) rc.dial+=d; rcRender(); }
function rcBack(){ rc.dial=rc.dial.slice(0,-1); rcRender(); }
function rcDial(){ if(!rc.dial) return; rc.active={who:rc.dial,from:'Outbound',out:true,patient:false,reason:''}; rc.dial=''; rcRender(); rcTick(); toast('Calling…'); }
function rcSimIn(){ const c=rc.queue[0]||{from:'(904) 555-0204',who:'New caller',patient:false,reason:'New patient'}; rc.incoming={...c}; rcRender(); toast('Incoming call'); }
function rcAnswer(){ rc.active={...rc.incoming}; rc.incoming=null; rc.muted=false; rc.hold=false; rc.queue=rc.queue.filter(q=>q.from!==rc.active.from); rcRender(); rcTick(); }
function rcDecline(){ const c=rc.incoming; rc.incoming=null; rcRender(); toast((c?c.who:'Caller')+' sent to Liftori AI'); }
function rcPick(i){ const c=rc.queue[i]; if(!c) return; if(rc.live&&c.id) sbUpd('cc_calls',c.id,{status:'active',answered_at:new Date().toISOString()}); rc.active={...c}; rc.queue.splice(i,1); rcRender(); rcTick(); }
function rcVm(i){ const v=rc.vm[i]; if(!v) return; if(v.unheard){v.unheard=false;} rc.active={who:v.who,from:v.from,out:true,patient:false,reason:'Returning voicemail'}; rcRender(); rcTick(); toast('Calling '+v.who+' back'); }
function rcMute(){ rc.muted=!rc.muted; rcRender(); rcTick(); }
function rcHold(){ rc.hold=!rc.hold; rcRender(); rcTick(); }
function rcXfer(){ toast('Transferring to triage nurse…'); }
function rcEnd(res){ const c=rc.active; if(rc.live&&c&&c.id) sbUpd('cc_calls',c.id,{status:'completed',disposition:(res==='done'?'Ended':res)+(rc.callReason?' / '+rc.callReason:''),ended_at:new Date().toISOString(),duration_seconds:rc.secs}); rcStop(); rc.active=null; const reason=rc.callReason?(' · '+rc.callReason):''; if(c){ rc.recent.unshift({who:c.who,dir:c.out?'out':'in',res:(res==='done'?'Ended':res)+reason,when:'now',dur:fmtSecs(rc.secs)}); rc.recent=rc.recent.slice(0,8); } rc.callReason=''; rcRender(); if(res&&res!=='done') toast(res+' · '+(c?c.who:'')); }

/* ---------------- init ---------------- */
const _vw=new URLSearchParams(location.search).get('view'); if(_vw==='reception'){ rcBoot(); } else if(_vw==='visit'){ vzBoot(); } else if(_vw==='intake'){ ixBoot(); } else { renderNav();renderMain();renderPtabs(); }
